<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow"><title>RASN Empreendimentos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{background:#070b15;color:#e7eef9;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    display:flex;align-items:center;justify-content:center;padding:22px;min-height:100vh;
    background-image:radial-gradient(800px 500px at 80% -10%,rgba(34,211,238,.10),transparent 60%),
      radial-gradient(700px 450px at 5% 0%,rgba(91,157,255,.08),transparent 55%)}
  .card{width:min(440px,100%);background:linear-gradient(180deg,#111a2e,#0e1526);
    border:1px solid #243352;border-radius:16px;padding:30px 26px;box-shadow:0 18px 50px -20px #000}
  .tag{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.28em;color:#22d3ee;text-transform:uppercase}
  h1{font-size:22px;margin:8px 0 4px;letter-spacing:-.01em}
  p{color:#8da3c4;font-size:13.5px;line-height:1.5;margin-bottom:18px}
  input{width:100%;background:#0a1020;border:1px solid #243352;border-radius:10px;color:#e7eef9;
    font-size:16px;padding:13px 14px;outline:none}
  input:focus{border-color:#22d3ee}
  button{width:100%;margin-top:12px;background:#1f6feb;border:0;border-radius:10px;color:#fff;
    font-size:15px;font-weight:600;padding:13px;cursor:pointer}
  button:hover{background:#2a7bff} button:disabled{opacity:.6;cursor:default}
  .err{color:#fb7185;font-size:13px;margin-top:12px;min-height:18px}
  .lock{font-size:26px;opacity:.7}
  .proj{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  @media(max-width:440px){.proj{grid-template-columns:1fr}}
  .pcard{display:block;text-decoration:none;color:inherit;background:#0a1020;border:1px solid #243352;
    border-radius:12px;padding:16px;transition:.15s}
  .pcard:hover{border-color:#22d3ee;transform:translateY(-1px)}
  .pcard .pn{font-weight:700;font-size:15px}
  .pcard .ps{font-size:11.5px;color:#8da3c4;margin-top:3px}
  .pcard .go{margin-top:12px;color:#22d3ee;font-size:12.5px;font-weight:600}
  .hide{display:none}
</style></head><body>
  <div class="card">
    <div id="senha">
      <div class="lock">🔒</div><div class="tag">RASN Empreendimentos</div>
      <h1>Acesso protegido</h1><p>Digite a senha para ver os projetos.</p>
      <form id="f"><input id="pw" type="password" placeholder="Senha" autocomplete="current-password" autofocus>
      <button id="b" type="submit">Entrar</button><div class="err" id="err"></div></form>
    </div>
    <div id="menu" class="hide">
      <div class="tag">RASN Empreendimentos</div><h1>Projetos</h1>
      <p>Escolha um projeto. A senha fica guardada — não precisa digitar de novo.</p>
      <div class="proj">
        <a class="pcard" href="piratuba.html"><div class="pn">Piratuba</div><div class="ps">Projeto 1 · ativo</div><div class="go">Abrir dashboard →</div></a>
        <a class="pcard" href="jaguariuna.html"><div class="pn">Jaguariúna</div><div class="ps">Projeto 2 · a iniciar</div><div class="go">Abrir dashboard →</div></a>
      </div>
    </div>
  </div>
<script>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decifra(blob,senha){
  const raw=b64(blob),salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(senha),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  return new TextDecoder().decode(await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct));
}

const VERIF="oD0i0/ZC8da1Q4mSFh0yn5xGZlncmwsQJTzRGmkq2XyQ/h47ChVKdhgEYX6Qnw==";
function mostraMenu(){document.getElementById("senha").classList.add("hide");document.getElementById("menu").classList.remove("hide");}
async function tenta(senha){await decifra(VERIF,senha);try{sessionStorage.setItem("rasn_pw",senha);}catch(e){}mostraMenu();}
(async()=>{const s=(function(){try{return sessionStorage.getItem("rasn_pw")}catch(e){return null}})();
  if(s){try{await tenta(s);return}catch(e){}}})();
const f=document.getElementById("f"),pw=document.getElementById("pw"),err=document.getElementById("err"),b=document.getElementById("b");
f.addEventListener("submit",async e=>{e.preventDefault();err.textContent="";b.disabled=true;b.textContent="Entrando…";
  try{await tenta(pw.value);}catch(ex){err.textContent="Senha incorreta.";b.disabled=false;b.textContent="Entrar";pw.select();}});
</script></body></html>
