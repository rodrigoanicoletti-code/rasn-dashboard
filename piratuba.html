const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decifra(blob,senha){
  const raw=b64(blob),salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(senha),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  return new TextDecoder().decode(await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct));
}

async function abrir(senha){const html=await decifra(BLOB,senha);
  try{sessionStorage.setItem("rasn_pw",senha);}catch(e){}
  document.open();document.write(html);document.close();}
(async()=>{const s=(function(){try{return sessionStorage.getItem("rasn_pw")}catch(e){return null}})();
  if(s){try{await abrir(s);return}catch(e){}}})();
